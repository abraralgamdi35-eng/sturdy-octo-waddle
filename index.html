<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurkiAI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#212121;color:#fff;display:flex;height:100vh}
        .sidebar{width:260px;background:#171717;padding:10px;display:flex;flex-direction:column;gap:10px}
        .new-chat-btn{width:100%;padding:10px;background:transparent;border:1px solid #444;color:#fff;border-radius:8px;cursor:pointer;font-size:14px}
        .new-chat-btn:hover{background:#2c2c2c}
        .search-input{width:100%;padding:8px 12px;background:#2f2f2f;border:1px solid #444;border-radius:6px;color:#fff;font-size:13px;outline:none}
        .chat-history{flex:1;overflow-y:auto}
        .history-item{padding:10px;color:#b4b4b4;font-size:13px;cursor:pointer;border-radius:6px}
        .history-item:hover{background:#2c2c2c}
        .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .welcome{text-align:center}
        .welcome h1{font-size:28px;margin-bottom:16px}
        .welcome button{background:#fff;color:#000;border:none;padding:10px 24px;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold}
        .welcome button:hover{background:#ddd}
        .chat-area{display:none;flex:1;width:100%;max-width:768px;padding:20px;overflow-y:auto;flex-direction:column;gap:16px}
        .message{display:flex;gap:8px}
        .message.user{justify-content:flex-end}
        .msg-bubble{padding:10px 14px;border-radius:12px;max-width:70%;font-size:15px;line-height:1.5}
        .msg-bubble.user{background:#2f2f2f}
        .input-area{width:100%;max-width:768px;padding:0 20px 16px}
        .input-box{display:flex;gap:8px}
        .input-box input{flex:1;padding:12px;background:#2f2f2f;border:1px solid #444;border-radius:12px;color:#fff;font-size:15px;outline:none}
        .input-box button{padding:12px 20px;background:#fff;color:#000;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
        .input-box button:hover{background:#ddd}
        .footer{text-align:center;font-size:11px;color:#888;margin-top:8px}
        .login-box{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;z-index:999}
        .login-inner{background:#1a1a1a;padding:30px;border-radius:16px;width:350px;text-align:center}
        .login-inner h2{margin-bottom:4px}
        .login-inner p{font-size:12px;color:#888;margin-bottom:16px}
        .login-inner input{width:100%;padding:10px;background:#2f2f2f;border:1px solid #444;border-radius:8px;color:#fff;margin-bottom:8px;outline:none}
        .login-inner button{width:100%;padding:10px;background:#fff;color:#000;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-bottom:6px}
        .login-inner .google-btn{background:#4285F4;color:#fff}
    </style>
</head>
<body>
    <div class="sidebar">
        <button class="new-chat-btn" id="newChatBtn">+ New chat</button>
        <input type="text" class="search-input" placeholder="Searching chats">
        <div class="chat-history" id="chatHistory"></div>
    </div>

    <div class="main">
        <div class="welcome" id="welcomeScreen">
            <h1>What's on your mind today?</h1>
            <button id="loginBtn">Log in</button>
        </div>
        <div class="chat-area" id="chatScreen">
            <div class="messages" id="chatMessages"></div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message TurkiAI...">
                <button id="sendBtn">Send</button>
            </div>
            <p class="footer">TurkiAI can make mistakes. Made by Turki, age 10.</p>
        </div>
    </div>

    <div class="login-box" id="loginBox">
        <div class="login-inner">
            <h2>Welcome</h2>
            <p>Made by Turki, age 10</p>
            <button class="google-btn" id="googleBtn">Sign in with Google</button>
            <input type="email" id="emailInput" placeholder="Email address">
            <button id="emailLoginBtn">Continue with Email</button>
            <button id="closeLoginBtn" style="background:transparent;color:#888;">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
